<!DOCTYPE html>
<html>
<head>
  <title>TalkZone</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body style="font-family:sans-serif; padding:20px;">

<h2>💬 TalkZone</h2>

<!-- LOGIN -->
<input id="user" placeholder="Username"><br><br>
<input id="pass" type="password" placeholder="Password"><br><br>
<button onclick="login()">Login / Signup</button>

<hr>

<!-- CHAT -->
<input id="msg" placeholder="Type message">
<button onclick="sendMsg()">Send</button>

<div id="chat" style="margin-top:20px;"></div>

<hr>

<!-- ADMIN -->
<input id="adminCode" placeholder="Admin Secret">
<button onclick="adminLogin()">Admin Login</button>

<div id="adminPanel" style="display:none; margin-top:10px;">
  <h3>👑 Admin Panel</h3>
  <button onclick="deleteAll()">Delete All Messages</button>
</div>

<script type="module">

// 🔥 FIREBASE SDK
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, addDoc, onSnapshot, getDoc, doc, getDocs, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// 🔥 CONFIG (already correct)
const firebaseConfig = {
  apiKey: "AIzaSyAKLZ4dHYp0ZFLolMB5XPxDUu-QPXB_MqA",
  authDomain: "talkzone-b3488.firebaseapp.com",
  projectId: "talkzone-b3488"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser = null;

// 🔐 LOGIN SYSTEM
window.login = async () => {
  const u = document.getElementById("user").value.trim();
  const p = document.getElementById("pass").value.trim();

  if(!u || !p){
    alert("Enter username & password");
    return;
  }

  const email = u + "@chat.com";

  try {
    const res = await signInWithEmailAndPassword(auth, email, p);
    currentUser = res.user.email;
    alert("Login success");
  } catch (e) {
    const res = await createUserWithEmailAndPassword(auth, email, p);
    currentUser = res.user.email;
    alert("Account created");
  }
};

// 📤 SEND MESSAGE
window.sendMsg = async () => {
  const msg = document.getElementById("msg").value;

  if(!msg || !currentUser){
    alert("Login first");
    return;
  }

  await addDoc(collection(db, "messages"), {
    user: currentUser,
    text: msg,
    time: new Date()
  });

  document.getElementById("msg").value = "";
};

// 💬 REALTIME CHAT
onSnapshot(collection(db, "messages"), snap => {
  const chat = document.getElementById("chat");
  chat.innerHTML = "";

  snap.forEach(doc => {
    const m = doc.data();

    const name = m.user.split("@")[0];

    if(m.user === currentUser){
      chat.innerHTML += `<div style="text-align:right;color:green;">
        You: ${m.text}
      </div>`;
    } else {
      chat.innerHTML += `<div style="text-align:left;color:blue;">
        ${name}: ${m.text}
      </div>`;
    }
  });

  chat.scrollTop = chat.scrollHeight;
});

// 👑 ADMIN LOGIN
window.adminLogin = async () => {
  const input = document.getElementById("adminCode").value;

  const snap = await getDoc(doc(db, "config", "admin"));

  if(!snap.exists()){
    alert("Admin config missing");
    return;
  }

  const realCode = snap.data().code;

  if(input === realCode){
    document.getElementById("adminPanel").style.display = "block";
    alert("Admin Mode ON");
  } else {
    alert("Wrong code");
  }
};

// 🧨 DELETE ALL MESSAGES (ADMIN)
window.deleteAll = async () => {
  const snap = await getDocs(collection(db, "messages"));

  snap.forEach(d => deleteDoc(d.ref));

  alert("All messages deleted");
};

</script>

</body>
</html>
