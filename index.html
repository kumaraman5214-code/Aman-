<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TalkZone Pro</title>

<style>
:root{
  --bg:#0d1117;
  --card:#161b22;
  --border:#30363d;
  --accent:#2ea043;
  --text:#e6edf3;
  --sub:#8b949e;
}

*{box-sizing:border-box;margin:0;padding:0}

body{
  background:var(--bg);
  color:var(--text);
  font-family:sans-serif;
}

/* LOGIN */
#login{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
}

.card{
  width:100%;
  max-width:380px;
  background:var(--card);
  padding:30px;
  border-radius:16px;
  border:1px solid var(--border);
}

.card h2{
  text-align:center;
  margin-bottom:20px;
}

input{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:8px;
  border:1px solid var(--border);
  background:#0d1117;
  color:white;
}

button{
  width:100%;
  padding:12px;
  margin-top:12px;
  border:none;
  border-radius:8px;
  background:var(--accent);
  color:white;
  font-weight:600;
}

/* APP */
#app{
  display:none;
  height:100vh;
  display:flex;
}

/* SIDEBAR */
.sidebar{
  width:280px;
  background:var(--card);
  border-right:1px solid var(--border);
  display:flex;
  flex-direction:column;
}

.header{
  padding:15px;
  border-bottom:1px solid var(--border);
  font-weight:600;
}

.users{
  flex:1;
  overflow:auto;
}

.user{
  padding:12px;
  border-bottom:1px solid var(--border);
  cursor:pointer;
  display:flex;
  align-items:center;
  gap:10px;
}

.user:hover{
  background:#0d1117;
}

.avatar{
  width:35px;
  height:35px;
  border-radius:50%;
  background:var(--accent);
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:bold;
}

.name{
  font-size:14px;
}

/* MAIN AREA */
.main{
  flex:1;
  display:flex;
  align-items:center;
  justify-content:center;
  color:var(--sub);
}

</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <div class="card">
    <h2>💬 TalkZone</h2>
    <input id="u" placeholder="Username">
    <input id="p" type="password" placeholder="Password">
    <button onclick="login()">Login / Signup</button>
  </div>
</div>

<!-- APP -->
<div id="app">

  <div class="sidebar">
    <div class="header">Users</div>
    <div class="users" id="list"></div>
  </div>

  <div class="main">
    Select a user to start chat
  </div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged }
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc, collection, query, where, getDocs, onSnapshot, serverTimestamp }
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey:"AIzaSyAKLZ4dHYp0ZFLolMB5XPxDUu-QPXB_MqA",
  authDomain:"talkzone-b3488.firebaseapp.com",
  projectId:"talkzone-b3488"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let ME=null;

/* LOGIN */
window.login = async ()=>{
  const u=document.getElementById("u").value.trim();
  const p=document.getElementById("p").value.trim();

  if(!u||!p){alert("Enter details");return;}

  const email=u.toLowerCase()+"@chat.com";

  try{
    let cred;

    try{
      cred = await signInWithEmailAndPassword(auth,email,p);
    }catch(e){

      const q=query(collection(db,'users'),where('name','==',u));
      const snap=await getDocs(q);

      if(!snap.empty){
        alert("Username exists");
        return;
      }

      cred = await createUserWithEmailAndPassword(auth,email,p);

      await setDoc(doc(db,'users',cred.user.uid),{
        name:u,
        uid:cred.user.uid,
        z:false,
        created:serverTimestamp()
      });
    }

  }catch(err){
    console.log(err);
    alert("Error");
  }
};

/* AUTH STATE */
onAuthStateChanged(auth, async user=>{
  if(user){
    ME=user;

    document.getElementById("login").style.display="none";
    document.getElementById("app").style.display="flex";

    loadUsers();
  }
});

/* LOAD USERS */
function loadUsers(){
  onSnapshot(collection(db,'users'),snap=>{
    const list=document.getElementById("list");
    list.innerHTML="";

    snap.forEach(d=>{
      const data=d.data();

      if(data.uid===ME.uid) return;

      const div=document.createElement("div");
      div.className="user";

      div.innerHTML=`
        <div class="avatar">${data.name[0].toUpperCase()}</div>
        <div class="name">${data.name}</div>
      `;

      list.appendChild(div);
    });
  });
}

</script>

</body>
</html>
