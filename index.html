<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>TalkZone</title>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<style>
body{font-family:sans-serif;background:#111;color:#fff;margin:0}
#loginSc,#appSc{display:none;padding:20px}
input{display:block;margin:10px 0;padding:10px;width:200px}
button{padding:10px;background:#25d366;border:none;color:#fff;cursor:pointer}
.user{padding:10px;border-bottom:1px solid #333;cursor:pointer}
.msg{padding:5px;margin:5px;border-radius:10px}
.sent{background:#0b4a2e;text-align:right}
.recv{background:#222}
</style>
</head>

<body>

<div id="loginSc">
  <h2>Login / Signup</h2>
  <input id="u" placeholder="username">
  <input id="p" type="password" placeholder="password">
  <button id="loginBtn">Continue</button>
</div>

<div id="appSc">
  <h3 id="myName"></h3>
  <button onclick="auth.signOut()">Logout</button>
  <hr>
  <div id="users"></div>
  <hr>
  <div id="chat"></div>
  <input id="msg">
  <button id="sendBtn">Send</button>
</div>

<script>
// FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyAKLZ4dHYp0ZFLolMB5XPxDUu-QPXB_MqA",
  authDomain: "talkzone-b3488.firebaseapp.com",
  projectId: "talkzone-b3488"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

const $ = id => document.getElementById(id);

let currentChat = null;

// AUTH STATE
auth.onAuthStateChanged(async user=>{
  if(user){
    loginSc.style.display="none";
    appSc.style.display="block";
    myName.innerText=user.email.split("@")[0];
    loadUsers();
  }else{
    loginSc.style.display="block";
    appSc.style.display="none";
  }
});

// LOGIN / SIGNUP FIXED
loginBtn.onclick = async ()=>{
  const username = u.value.trim().toLowerCase();
  const password = p.value.trim();

  if(!username || password.length<6){
    alert("Min 6 password");
    return;
  }

  const email = username+"@tz.com";

  try{
    await auth.signInWithEmailAndPassword(email,password);
    alert("Login success ✅");

  }catch(e){

    // 👉 अगर user नहीं मिला → create करो
    if(e.code==="auth/user-not-found" || e.code==="auth/invalid-credential"){

      try{
        const res = await auth.createUserWithEmailAndPassword(email,password);

        await db.collection("users").doc(res.user.uid).set({
          uid: res.user.uid,
          name: username
        });

        alert("Account created ✅");

      }catch(err){

        if(err.code==="auth/email-already-in-use"){
          alert("Wrong password ❌");
        }else{
          alert(err.message);
        }
      }

    }else if(e.code==="auth/wrong-password"){
      alert("Wrong password ❌");
    }else{
      alert(e.message);
    }
  }
};

// LOAD USERS
function loadUsers(){
  db.collection("users").onSnapshot(snap=>{
    users.innerHTML="";
    snap.forEach(doc=>{
      const u=doc.data();
      if(u.uid===auth.currentUser.uid) return;

      const div=document.createElement("div");
      div.className="user";
      div.innerText=u.name;

      div.onclick=()=>openChat(u);
      users.appendChild(div);
    });
  });
}

// OPEN CHAT
function openChat(user){
  chat.innerHTML="";
  const my=auth.currentUser.uid;

  currentChat = my<user.uid ? my+"_"+user.uid : user.uid+"_"+my;

  db.collection("chats").doc(currentChat).collection("messages")
  .orderBy("time")
  .onSnapshot(snap=>{
    chat.innerHTML="";
    snap.forEach(d=>{
      const m=d.data();
      const div=document.createElement("div");
      div.className="msg "+(m.from===my?"sent":"recv");
      div.innerText=m.text;
      chat.appendChild(div);
    });
  });
}

// SEND MESSAGE
sendBtn.onclick=()=>{
  const text=msg.value.trim();
  if(!text || !currentChat) return;

  db.collection("chats").doc(currentChat).collection("messages").add({
    text,
    from:auth.currentUser.uid,
    time:firebase.firestore.FieldValue.serverTimestamp()
  });

  msg.value="";
};
</script>

</body>
  </html>
