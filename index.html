<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TalkZone Final</title>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<style>
body{margin:0;font-family:sans-serif;background:#0d1117;color:#fff}
.app{display:flex;height:100vh}

/* Sidebar */
.sidebar{width:250px;background:#161b22;overflow:auto}
.user{padding:12px;cursor:pointer;border-bottom:1px solid #30363d}
.user:hover{background:#21262d}

/* Chat */
.chat{flex:1;display:flex;flex-direction:column}
.top{padding:10px;border-bottom:1px solid #30363d}
.msgs{flex:1;overflow:auto;padding:10px}
.msg{padding:8px;margin:5px;border-radius:8px;max-width:60%}
.me{background:#2ea043;margin-left:auto}
.other{background:#30363d}
.input{display:flex}
input{flex:1;padding:10px;border:none}
button{padding:10px;background:#2ea043;color:#fff;border:none}

/* Login */
.login{position:absolute;inset:0;display:flex;justify-content:center;align-items:center;background:#0d1117}
.box{background:#161b22;padding:20px;border-radius:10px;width:300px}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login" class="login">
 <div class="box">
  <h2>TalkZone</h2>
  <input id="name" placeholder="Username"><br><br>
  <button onclick="login()">Enter</button>
  <p id="err" style="color:red"></p>
 </div>
</div>

<!-- APP -->
<div id="app" class="app" style="display:none">
 <div class="sidebar" id="users"></div>

 <div class="chat">
  <div id="chatTop" class="top">Select user</div>
  <div id="msgs" class="msgs"></div>
  <div class="input">
   <input id="msg">
   <button onclick="send()">Send</button>
  </div>
 </div>
</div>

<script>
const firebaseConfig={
 apiKey:"AIzaSyAKLZ4dHYp0ZFLolMB5XPxDUu-QPXB_MqA",
 authDomain:"talkzone-b3488.firebaseapp.com",
 projectId:"talkzone-b3488"
};

firebase.initializeApp(firebaseConfig);
const auth=firebase.auth();
const db=firebase.firestore();

let me=null,chatUser=null,chatId=null,unsub=null;

/* LOGIN */
async function login(){
 let n=name.value.trim().toLowerCase();
 if(n.length<3){err.innerText="min 3 char";return;}

 let email=n+"@chat.com";
 let pass="123456";

 try{
  let cred;
  try{
    cred=await auth.signInWithEmailAndPassword(email,pass);
  }catch(e){
    if(e.code==="auth/user-not-found"){
      cred=await auth.createUserWithEmailAndPassword(email,pass);
    }else throw e;
  }

  await db.collection("users").doc(cred.user.uid).set({
    name:n,uid:cred.user.uid,banned:false
  },{merge:true});

 }catch(e){
  err.innerText=e.message;
 }
}

/* AUTH */
auth.onAuthStateChanged(u=>{
 if(u){
  me=u;
  login.style.display="none";
  app.style.display="flex";
  loadUsers();
 }
});

/* USERS */
function loadUsers(){
 db.collection("users").onSnapshot(s=>{
  users.innerHTML="";
  s.forEach(d=>{
   let u=d.data();
   if(u.uid===me.uid) return;

   let div=document.createElement("div");
   div.className="user";
   div.innerText=u.name;
   div.onclick=()=>openChat(u);
   users.appendChild(div);
  });
 });
}

/* OPEN CHAT */
function openChat(u){
 chatUser=u;
 chatId=[me.uid,u.uid].sort().join("_");
 chatTop.innerText=u.name;

 if(unsub) unsub();

 unsub=db.collection("chats/"+chatId+"/messages")
 .orderBy("t")
 .onSnapshot(s=>{
  msgs.innerHTML="";
  s.forEach(d=>{
   let m=d.data();
   let div=document.createElement("div");
   div.className="msg "+(m.s===me.uid?"me":"other");
   div.innerText=m.text;
   msgs.appendChild(div);
  });
  msgs.scrollTop=msgs.scrollHeight;
 });
}

/* SEND */
function send(){
 let t=msg.value.trim();
 if(!t||!chatId) return;

 db.collection("chats/"+chatId+"/messages").add({
  text:t,
  s:me.uid,
  t:firebase.firestore.FieldValue.serverTimestamp()
 });

 msg.value="";
}

/* ENTER KEY */
msg.addEventListener("keydown",e=>{
 if(e.key==="Enter") send();
});
</script>

</body>
</html>
