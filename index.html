<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>TalkZone Pro</title>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

<style>
body{margin:0;background:#0d1117;color:#fff;font-family:sans-serif}
.app{display:flex;height:100vh}
.sidebar{width:300px;background:#161b22;overflow:auto}
.chat{flex:1;display:flex;flex-direction:column}

.user{padding:10px;border-bottom:1px solid #222;cursor:pointer}
.user:hover{background:#222}

.msg{margin:5px;padding:8px;border-radius:8px;max-width:60%}
.me{background:#2ea043;margin-left:auto}
.other{background:#30363d}

.top{padding:10px;border-bottom:1px solid #333}

input,button{padding:10px;border:none}
input{background:#0d1117;color:#fff;width:100%}
button{background:#2ea043;color:#fff}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
<input id="u" placeholder="username">
<input id="p" type="password" placeholder="password">
<button onclick="login()">Login</button>
</div>

<div id="app" class="app" style="display:none">

<div class="sidebar" id="chatList"></div>

<div class="chat">
<div class="top" id="chatTop"></div>
<div id="msgs" style="flex:1;overflow:auto"></div>
<input id="m" placeholder="message">
<button onclick="send()">Send</button>
</div>

</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAKLZ4dHYp0ZFLolMB5XPxDUu-QPXB_MqA",
  authDomain: "talkzone-b3488.firebaseapp.com",
  projectId: "talkzone-b3488",
  databaseURL:"https://talkzone-b3488-default-rtdb.firebaseio.com"
};

firebase.initializeApp(firebaseConfig);

const auth=firebase.auth();
const db=firebase.firestore();
const rtdb=firebase.database();

let ME=null,currentChat=null,otherUID=null;

// 🔥 LOGIN (FIXED)
async function login(){
let u=uEl.value.trim().toLowerCase();
let p=pEl.value;
let email=u+"@chat.com";

try{
await auth.signInWithEmailAndPassword(email,p);
}catch(e){

if(e.code==="auth/user-not-found"){

// UNIQUE USERNAME LOCK
let check=await db.collection("users").where("name","==",u).get();
if(!check.empty){
alert("Username already taken ❌");
return;
}

let cred=await auth.createUserWithEmailAndPassword(email,p);

await db.collection("users").doc(cred.user.uid).set({
name:u,uid:cred.user.uid
});

}else if(e.code==="auth/wrong-password"){
alert("Wrong password ❌");
return;
}
}
}

// AUTH
auth.onAuthStateChanged(user=>{
if(user){
ME=user;
login.style.display="none";
app.style.display="flex";
setOnline();
loadChats();
}
});

// 🔥 ONLINE + LAST SEEN
function setOnline(){
let ref=rtdb.ref("status/"+ME.uid);

ref.set({state:"online",time:Date.now()});

ref.onDisconnect().set({state:"offline",time:Date.now()});
}

// LOAD CHATS
function loadChats(){
db.collection("chats")
.where("members","array-contains",ME.uid)
.onSnapshot(snap=>{
chatList.innerHTML="";

snap.forEach(doc=>{
let c=doc.data();
let other=c.members.find(x=>x!==ME.uid);

db.collection("users").doc(other).get().then(uDoc=>{
let u=uDoc.data();

let div=document.createElement("div");
div.className="user";
div.innerHTML=`
<b>${u.name}</b><br>
${c.lastMsg||""}
${c.unread?.[ME.uid]?"🔴":""}
`;

div.onclick=()=>openChat(doc.id,u.uid,u.name);

chatList.appendChild(div);
});
});
});
}

// OPEN CHAT
function openChat(id,uid,name){
currentChat=id;
otherUID=uid;

chatTop.innerText=name;

loadMessages();
listenStatus();
}

// 🔥 LAST SEEN
function listenStatus(){
rtdb.ref("status/"+otherUID).on("value",snap=>{
let d=snap.val();
if(!d)return;

if(d.state==="online"){
chatTop.innerText+=" (online)";
}else{
chatTop.innerText+=` (last seen ${new Date(d.time).toLocaleTimeString()})`;
}
});
}

// LOAD MESSAGES
function loadMessages(){
db.collection("chats").doc(currentChat)
.collection("messages")
.orderBy("time")
.onSnapshot(snap=>{
msgs.innerHTML="";

snap.forEach(doc=>{
let m=doc.data();

let div=document.createElement("div");
div.className="msg "+(m.uid===ME.uid?"me":"other");

let tick=m.uid===ME.uid?(m.seen?"✔✔":"✔"):"";

div.innerHTML=`
${m.text} ${tick}
`;

div.onclick=()=>{
if(confirm("Delete for everyone?")){
doc.ref.delete();
}
};

msgs.appendChild(div);
});

msgs.scrollTop=msgs.scrollHeight;
});
}

// SEND
function send(){
let text=m.value;
if(!text)return;

let ref=db.collection("chats").doc(currentChat);

ref.collection("messages").add({
text:text,
uid:ME.uid,
time:Date.now(),
seen:false
});

ref.set({
members:[ME.uid,otherUID],
lastMsg:text,
lastTime:Date.now(),
unread:{[otherUID]:firebase.firestore.FieldValue.increment(1)}
},{merge:true});

m.value="";
}

// 🔥 SEEN SYSTEM
setInterval(()=>{
if(!currentChat)return;

db.collection("chats").doc(currentChat)
.collection("messages")
.where("uid","!=",ME.uid)
.get().then(snap=>{
snap.forEach(d=>d.ref.update({seen:true}));
});
},2000);

// 🔥 TYPING
m.addEventListener("input",()=>{
rtdb.ref("typing/"+currentChat+"/"+ME.uid).set(true);

setTimeout(()=>{
rtdb.ref("typing/"+currentChat+"/"+ME.uid).set(false);
},1000);
});

rtdb.ref("typing/"+currentChat).on("value",snap=>{
let data=snap.val();
if(!data)return;

if(data[otherUID]){
chatTop.innerText="typing...";
}
});

</script>

</body>
</html>
