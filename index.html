<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>TalkZone</title>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ── RESET & BASE ── */
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0d1117;
  --sb:#111820;
  --card:#161b22;
  --card2:#1c2128;
  --border:#21262d;
  --green:#25d366;
  --green-d:#128c7e;
  --green-msg:#0b4a2e;
  --blue:#58a6ff;
  --red:#f85149;
  --txt:#e6edf3;
  --txt2:#8b949e;
  --txt3:#484f58;
  --online:#25d366;
  --radius:18px;
  --shadow:0 4px 24px rgba(0,0,0,0.45);
}
html,body{height:100%;overflow:hidden;font-family:'Inter',sans-serif;background:var(--bg);color:var(--txt);font-size:15px}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}

/* ── ANIMATIONS ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}
@keyframes msgPop{from{opacity:0;transform:scale(0.95) translateY(6px)}to{opacity:1;transform:scale(1) translateY(0)}}

/* ── LOADING ── */
#loadSc{
  position:fixed;inset:0;background:var(--bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:18px;z-index:9999;transition:opacity 0.35s;
}
.ld-logo{font-size:30px;font-weight:700;letter-spacing:-1px}
.ld-logo em{color:var(--green);font-style:normal}
.ld-spin{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin 0.75s linear infinite}

/* ── LOGIN ── */
#loginSc{
  position:fixed;inset:0;background:var(--bg);
  display:none;align-items:center;justify-content:center;padding:20px;z-index:100;
}
.login-card{
  background:var(--card);border:1px solid var(--border);border-radius:20px;
  padding:44px 38px;width:100%;max-width:380px;
  box-shadow:var(--shadow);animation:fadeUp 0.4s ease;
}
.lc-brand{display:flex;align-items:center;gap:13px;margin-bottom:28px}
.lc-icon{
  width:46px;height:46px;border-radius:13px;
  background:linear-gradient(135deg,var(--green),var(--green-d));
  display:flex;align-items:center;justify-content:center;font-size:22px;
  box-shadow:0 3px 12px rgba(37,211,102,0.3);
}
.lc-name{font-size:24px;font-weight:700;letter-spacing:-0.5px}
.lc-name span{color:var(--green)}
.lc-sub{font-size:13px;color:var(--txt2);margin-bottom:24px;line-height:1.6}
.lc-field{margin-bottom:14px}
.lc-field label{display:block;font-size:11px;font-weight:600;color:var(--txt2);text-transform:uppercase;letter-spacing:1px;margin-bottom:7px}
.lc-field input{
  width:100%;padding:12px 14px;background:var(--card2);
  border:1.5px solid var(--border);border-radius:10px;
  color:var(--txt);font-size:15px;font-family:inherit;outline:none;
  transition:border-color 0.2s,box-shadow 0.2s;
}
.lc-field input:focus{border-color:var(--green);box-shadow:0 0 0 3px rgba(37,211,102,0.1)}
.lc-field input::placeholder{color:var(--txt3)}
.lc-btn{
  width:100%;padding:13px;margin-top:8px;
  background:var(--green);border:none;border-radius:10px;
  color:#fff;font-size:15px;font-weight:600;font-family:inherit;
  cursor:pointer;transition:opacity 0.2s,transform 0.1s;
}
.lc-btn:hover{opacity:0.88}
.lc-btn:active{transform:scale(0.98)}
.lc-btn:disabled{opacity:0.5;cursor:not-allowed}
.lc-note{text-align:center;font-size:12px;color:var(--txt3);margin-top:14px}

/* ── APP LAYOUT ── */
#appSc{display:none;height:100vh;width:100vw;flex-direction:row;overflow:hidden}

/* ── SIDEBAR ── */
.sidebar{
  width:340px;min-width:340px;height:100vh;
  background:var(--sb);border-right:1px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden;
  transition:transform 0.28s ease;
}

.sb-head{
  padding:13px 16px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;gap:10px;
  background:var(--sb);position:sticky;top:0;z-index:10;
}
.sb-me{display:flex;align-items:center;gap:11px;flex:1;min-width:0}
.av{
  border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-weight:700;color:#fff;flex-shrink:0;position:relative;
  font-size:15px;background:var(--green-d);
}
.av.lg{width:40px;height:40px}
.av.sm{width:36px;height:36px;font-size:13px}
.av-online{
  position:absolute;bottom:0;right:0;
  width:10px;height:10px;background:var(--online);
  border-radius:50%;border:2px solid var(--sb);
}
.sb-me-info .sb-name{font-weight:600;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb-me-info .sb-tag{font-size:12px;color:var(--green);margin-top:1px;display:flex;align-items:center;gap:4px}
.sb-me-info .sb-tag::before{content:'';display:inline-block;width:7px;height:7px;background:var(--online);border-radius:50%;animation:blink 2.5s infinite}
.logout-btn{
  background:transparent;border:1px solid var(--border);
  color:var(--txt2);padding:6px 11px;border-radius:8px;
  font-size:12px;font-family:inherit;cursor:pointer;transition:all 0.2s;white-space:nowrap;
}
.logout-btn:hover{border-color:var(--red);color:var(--red)}

.sb-search{padding:10px 14px;border-bottom:1px solid var(--border)}
.sb-search-wrap{position:relative}
.sb-search-wrap input{
  width:100%;padding:9px 14px 9px 36px;
  background:var(--card2);border:1.5px solid var(--border);border-radius:99px;
  color:var(--txt);font-size:13px;font-family:inherit;outline:none;
}
.sb-search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--txt3);font-size:14px;pointer-events:none}

.sb-lbl{padding:9px 16px 3px;font-size:11px;font-weight:600;color:var(--txt3);text-transform:uppercase;letter-spacing:1.2px}
.sb-list{flex:1;overflow-y:auto;padding:4px 0}

.sb-user{
  padding:11px 14px;cursor:pointer;display:flex;align-items:center;gap:12px;
  transition:background 0.15s;border-left:3px solid transparent;
}
.sb-user:hover{background:var(--card2)}
.sb-user.active{background:rgba(37,211,102,0.07);border-left-color:var(--green)}
.sb-user-info{flex:1;min-width:0}
.sb-user-name{font-weight:600;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb-user-prev{font-size:12px;color:var(--txt2);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* ── CHAT AREA ── */
.chat-area{flex:1;display:flex;flex-direction:column;height:100vh;background:var(--bg);min-width:0;position:relative}
.no-chat{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;color:var(--txt2)}
.nc-icon{width:80px;height:80px;background:var(--card);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:38px;border:1px solid var(--border)}

.chat-head{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;background:var(--sb);flex-shrink:0}
.chat-head-info{flex:1;min-width:0}
.chat-head-name{font-weight:700;font-size:15px}
.chat-head-status{font-size:12px;color:var(--txt2)}

.msgs-wrap{flex:1;overflow-y:auto;padding:14px 16px;display:flex;flex-direction:column;gap:4px}
.msg-row{display:flex;animation:msgPop 0.18s ease}
.msg-row.sent{justify-content:flex-end}
.msg-row.recv{justify-content:flex-start}
.msg-bub{max-width:65%;padding:9px 13px;border-radius:16px;font-size:14px;line-height:1.55;position:relative}
.msg-row.sent .msg-bub{background:var(--green-msg);border-bottom-right-radius:3px}
.msg-row.recv .msg-bub{background:var(--card);border-bottom-left-radius:3px}

.inp-area{padding:10px 14px;border-top:1px solid var(--border);display:flex;align-items:center;gap:8px;background:var(--sb)}
.msg-input{flex:1;padding:11px 16px;background:var(--card2);border:1.5px solid var(--border);border-radius:99px;color:var(--txt);outline:none}
.send-btn{width:42px;height:42px;background:var(--green);border:none;border-radius:50%;color:#fff;cursor:pointer}

.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--card2);padding:10px 22px;border-radius:99px;opacity:0;transition:0.3s;z-index:9000}
.toast.show{opacity:1}
</style>
</head>
<body>

<div id="loadSc"><div class="ld-logo">Talk<em>Zone</em></div><div class="ld-spin"></div></div>

<div id="loginSc">
  <div class="login-card">
    <div class="lc-brand"><div class="lc-icon">💬</div><div class="lc-name">Talk<span>Zone</span></div></div>
    <div class="lc-field"><label>Username</label><input type="text" id="u" placeholder="username"></div>
    <div class="lc-field"><label>Password</label><input type="password" id="p" placeholder="password"></div>
    <button class="lc-btn" id="loginBtn">Login / Sign Up</button>
  </div>
</div>

<div id="appSc">
  <div class="sidebar" id="sidebar">
    <div class="sb-head">
      <div class="sb-me">
        <div class="av lg" id="myAv">U</div>
        <div class="sb-me-info"><div class="sb-name" id="myName">User</div></div>
      </div>
      <button class="logout-btn" id="logoutBtn">Logout</button>
    </div>
    <div class="sb-list" id="list"></div>
  </div>
  <div class="chat-area">
    <div class="no-chat" id="noChat"><div class="nc-icon">💬</div><h3>TalkZone</h3></div>
    <div id="chatView" style="display:none;flex:1;flex-direction:column;height:100%">
      <div class="chat-head">
        <div class="av sm" id="chatAv">C</div>
        <div class="chat-head-info"><div class="chat-head-name" id="chatName">-</div></div>
      </div>
      <div class="msgs-wrap" id="msgs"></div>
      <div class="inp-area">
        <input class="msg-input" id="m" placeholder="Type a message...">
        <button class="send-btn" id="sendBtn">➤</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toastEl"></div>

<script>
// ── FIREBASE INIT ──
const firebaseConfig = {
  apiKey: "AIzaSyAKLZ4dHYp0ZFLolMB5XPxDUu-QPXB_MqA",
  authDomain: "talkzone-b3488.firebaseapp.com",
  projectId: "talkzone-b3488"
};

// Global Firebase Initialization
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db   = firebase.firestore();

// ── APP LOGIC ──
const $ = id => document.getElementById(id);

function toast(msg) {
  $('toastEl').textContent = msg;
  $('toastEl').classList.add('show');
  setTimeout(() => $('toastEl').classList.remove('show'), 2000);
}

// Auth State
auth.onAuthStateChanged(user => {
  $('loadSc').style.opacity = '0';
  setTimeout(() => $('loadSc').style.display = 'none', 400);

  if (user) {
    $('loginSc').style.display = 'none';
    $('appSc').style.display = 'flex';
    $('myName').textContent = user.displayName || 'User';
    loadUsers();
  } else {
    $('loginSc').style.display = 'flex';
    $('appSc').style.display = 'none';
  }
});

// Login / Signup Logic
$('loginBtn').onclick = async () => {
  const u = $('u').value.trim();
  const p = $('p').value.trim();
  if (!u || p.length < 6) return toast("Username/Password (min 6) required");

  const email = `${u}@talkzone.app`;
  try {
    // Try Login
    await auth.signInWithEmailAndPassword(email, p);
  } catch (e) {
    if (e.code === 'auth/user-not-found') {
      // Create User
      const res = await auth.createUserWithEmailAndPassword(email, p);
      await res.user.updateProfile({ displayName: u });
      await db.collection('users').doc(res.user.uid).set({
        uid: res.user.uid,
        name: u,
        status: 'online'
      });
    } else {
      toast(e.message);
    }
  }
};

$('logoutBtn').onclick = () => auth.signOut();

function loadUsers() {
  db.collection('users').onSnapshot(snap => {
    $('list').innerHTML = '';
    snap.forEach(doc => {
      const u = doc.data();
      if (u.uid === auth.currentUser.uid) return;
      
      const el = document.createElement('div');
      el.className = 'sb-user';
      el.innerHTML = `<div class="av sm">${u.name[0].toUpperCase()}</div>
                      <div class="sb-user-info"><div class="sb-user-name">${u.name}</div></div>`;
      el.onclick = () => openChat(u);
      $('list').appendChild(el);
    });
  });
}

function openChat(user) {
  $('noChat').style.display = 'none';
  $('chatView').style.display = 'flex';
  $('chatName').textContent = user.name;
  $('chatAv').textContent = user.name[0].toUpperCase();
  
  const cid = auth.currentUser.uid < user.uid ? 
              `${auth.currentUser.uid}_${user.uid}` : 
              `${user.uid}_${auth.currentUser.uid}`;

  // Load Messages
  db.collection('chats').doc(cid).collection('messages')
    .orderBy('time', 'asc')
    .onSnapshot(snap => {
      $('msgs').innerHTML = '';
      snap.forEach(doc => {
        const m = doc.data();
        const side = m.from === auth.currentUser.uid ? 'sent' : 'recv';
        const div = document.createElement('div');
        div.className = `msg-row ${side}`;
        div.innerHTML = `<div class="msg-bub">${m.text}</div>`;
        $('msgs').appendChild(div);
      });
      $('msgs').scrollTop = $('msgs').scrollHeight;
    });

  $('sendBtn').onclick = () => {
    const txt = $('m').value.trim();
    if (!txt) return;
    db.collection('chats').doc(cid).collection('messages').add({
      text: txt,
      from: auth.currentUser.uid,
      time: firebase.firestore.FieldValue.serverTimestamp()
    });
    $('m').value = '';
  };
}
</script>
</body>
  </html>
