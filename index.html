<!DOCTYPE html>
<html>
<head>
  <title>TalkZone Chat</title>
</head>
<body>

<h2>TalkZone Chat</h2>

<input id="user" placeholder="username">
<input id="pass" type="password" placeholder="password">
<button onclick="login()">Login</button>

<hr>

<input id="msg" placeholder="message">
<button onclick="sendMsg()">Send</button>

<div id="chat"></div>

<!-- Firebase CDN -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAKLZ4dHYp0ZFLolMB5XPxDUu-QPXB_MqA",
  authDomain: "talkzone-b3488.firebaseapp.com",
  projectId: "talkzone-b3488",
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

function login() {
  const email = document.getElementById("user").value + "@test.com";
  const pass = document.getElementById("pass").value;

  auth.signInWithEmailAndPassword(email, pass)
    .then(() => alert("Login success"))
    .catch(() => {
      auth.createUserWithEmailAndPassword(email, pass)
        .then(() => alert("Account created"))
        .catch(err => alert(err.message));
    });
}

function sendMsg() {
  const msg = document.getElementById("msg").value;
  const user = auth.currentUser.email;

  db.collection("messages").add({
    text: msg,
    user: user,
    time: new Date()
  });
}

db.collection("messages")
  .orderBy("time")
  .onSnapshot(snapshot => {
    const chat = document.getElementById("chat");
    chat.innerHTML = "";

    snapshot.forEach(doc => {
      const m = doc.data();
      chat.innerHTML += `<p><b>${m.user}:</b> ${m.text}</p>`;
    });
  });
</script>

</body>
</html>
