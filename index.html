<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TalkZone Pro</title>

<style>
:root{
  --bg:#0d1117;
  --panel:#161b22;
  --border:#30363d;
  --accent:#2ea043;
  --text:#e6edf3;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif}
body{background:var(--bg);color:var(--text);height:100vh}

/* LOGIN */
#login{
  position:fixed;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
}

.card{
  width:90%;
  max-width:380px;
  background:var(--panel);
  padding:25px;
  border-radius:16px;
  border:1px solid var(--border);
}

input{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:8px;
  border:1px solid var(--border);
  background:#0d1117;
  color:#fff;
}

button{
  width:100%;
  padding:12px;
  margin-top:12px;
  border:none;
  border-radius:8px;
  background:var(--accent);
  color:white;
  font-weight:600;
}

/* APP */
#app{
  display:none; /* ✅ FIXED */
  height:100vh;
}

/* SIDEBAR */
.sidebar{
  width:300px;
  background:var(--panel);
  border-right:1px solid var(--border);
  height:100%;
  float:left;
}

.users{
  overflow:auto;
  height:calc(100vh - 50px);
}

.user{
  padding:12px;
  border-bottom:1px solid var(--border);
}

/* CHAT */
.chat{
  margin-left:300px;
  height:100vh;
  display:flex;
  flex-direction:column;
}

.chat-box{
  flex:1;
  padding:15px;
  color:#888;
}

.input{
  display:flex;
  border-top:1px solid var(--border);
}

.input input{
  flex:1;
}

.input button{
  width:100px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <div class="card">
    <h2>TalkZone</h2>
    <input id="u" placeholder="Username">
    <input id="p" type="password" placeholder="Password">
    <button onclick="login()">Login / Signup</button>
  </div>
</div>

<!-- APP -->
<div id="app">

  <div class="sidebar">
    <h3 style="padding:10px">Users</h3>
    <div class="users" id="list"></div>
  </div>

  <div class="chat">
    <div class="chat-box">Select user to chat</div>
    <div class="input">
      <input placeholder="Type message...">
      <button>Send</button>
    </div>
  </div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged }
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, setDoc, collection, query, where, getDocs, onSnapshot, serverTimestamp }
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey:"AIzaSyAKLZ4dHYp0ZFLolMB5XPxDUu-QPXB_MqA",
  authDomain:"talkzone-b3488.firebaseapp.com",
  projectId:"talkzone-b3488"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let ME=null;

/* LOGIN */
window.login = async ()=>{
  const u=document.getElementById("u").value.trim();
  const p=document.getElementById("p").value.trim();

  if(!u||!p){alert("Enter details");return;}

  const email=u.toLowerCase()+"@chat.com";

  try{
    let cred;

    try{
      cred = await signInWithEmailAndPassword(auth,email,p);
    }catch(e){

      const q=query(collection(db,'users'),where('name','==',u));
      const snap=await getDocs(q);

      if(!snap.empty){
        alert("Username exists");
        return;
      }

      cred = await createUserWithEmailAndPassword(auth,email,p);

      await setDoc(doc(db,'users',cred.user.uid),{
        name:u,
        uid:cred.user.uid,
        z:false,
        created:serverTimestamp()
      });
    }

  }catch(err){
    console.log(err);
    alert("Error");
  }
};

/* AUTH STATE */
onAuthStateChanged(auth, user=>{
  if(user){
    ME=user;

    document.getElementById("login").style.display="none";
    document.getElementById("app").style.display="block";

    loadUsers();
  }
});

/* USERS */
function loadUsers(){
  onSnapshot(collection(db,'users'),snap=>{
    const list=document.getElementById("list");
    list.innerHTML="";

    snap.forEach(d=>{
      const data=d.data();

      if(data.uid===ME.uid) return;

      const div=document.createElement("div");
      div.className="user";
      div.innerText=data.name;

      list.appendChild(div);
    });
  });
}

</script>

</body>
</html>
