<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TalkZone</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#0d1117;
  color:#e6edf3;
}

.container{
  max-width:500px;
  margin:auto;
  padding:15px;
}

h2{
  text-align:center;
  margin-bottom:10px;
}

input{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:8px;
  border:1px solid #30363d;
  background:#161b22;
  color:white;
}

button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:8px;
  background:#2ea043;
  color:white;
  font-weight:600;
}

.user{
  padding:10px;
  border-bottom:1px solid #30363d;
  cursor:pointer;
}

.user:hover{
  background:#161b22;
}

.chat{
  height:300px;
  overflow:auto;
  border:1px solid #30363d;
  padding:10px;
  margin-top:10px;
  border-radius:8px;
}

.me{
  text-align:right;
  color:#2ea043;
  margin:5px 0;
}

.them{
  text-align:left;
  color:#58a6ff;
  margin:5px 0;
}

.admin{
  background:#f85149;
}
</style>
</head>

<body>

<div class="container">

<h2>💬 TalkZone</h2>

<input id="user" placeholder="Username">
<input id="pass" type="password" placeholder="Password">
<button onclick="login()">Login / Signup</button>

<hr>

<h3>Users</h3>
<div id="users"></div>

<hr>

<h3 id="chatWith">Select user</h3>
<div id="chatBox" class="chat"></div>

<input id="msg" placeholder="Type message">
<button onclick="sendMsg()">Send</button>

<br><br>
<button onclick="deleteAll()">🧨 Delete All (Admin)</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword }
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc, collection, addDoc, onSnapshot, getDocs, deleteDoc }
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAKLZ4dHYp0ZFLolMB5XPxDUu-QPXB_MqA",
  authDomain: "talkzone-b3488.firebaseapp.com",
  projectId: "talkzone-b3488"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let me=null;
let isAdmin=false;
let currentChat=null;

// 🔐 encode / decode
function enc(t){ return btoa(t); }
function dec(t){ return atob(t); }

// 🔐 LOGIN
window.login = async ()=>{
  let u=user.value.trim();
  let p=pass.value.trim();

  if(!u||!p) return alert("Enter details");

  let email=u+"@chat.com";

  try{
    let res=await signInWithEmailAndPassword(auth,email,p);
    me=res.user.uid;
  }catch{
    let res=await createUserWithEmailAndPassword(auth,email,p);
    me=res.user.uid;
  }

  // save user
  await setDoc(doc(db,"users",me),{name:u});

  // 🔥 admin check
  const snap=await getDoc(doc(db,"users",me));
  isAdmin = snap.data()?.z === true;

  console.log("Admin:", isAdmin);

  loadUsers();
};

// USERS
function loadUsers(){
  onSnapshot(collection(db,"users"),snap=>{
    users.innerHTML="";
    snap.forEach(d=>{
      if(d.id===me) return;

      const data=d.data();

      users.innerHTML+=`
      <div class="user" onclick="openChat('${d.id}','${data.name}')">
      ${data.name}
      </div>`;
    });
  });
}

// CHAT ID
function chatId(a,b){
  return a<b?a+"_"+b:b+"_"+a;
}

// OPEN CHAT
window.openChat=(uid,name)=>{
  currentChat=chatId(me,uid);
  chatWith.innerText="Chat with "+name;

  onSnapshot(collection(db,"chats",currentChat,"messages"),snap=>{
    chatBox.innerHTML="";

    snap.forEach(d=>{
      let m=d.data();

      let text = m.text ? dec(m.text) : "";

      chatBox.innerHTML+=`
      <div class="${m.sender===me?'me':'them'}">
      ${text}
      </div>`;
    });

    chatBox.scrollTop=chatBox.scrollHeight;
  });
};

// SEND
window.sendMsg=async ()=>{
  if(!currentChat) return alert("Select user");

  let text=msg.value.trim();
  if(!text) return;

  await addDoc(collection(db,"chats",currentChat,"messages"),{
    text:enc(text),
    sender:me,
    time:new Date()
  });

  msg.value="";
};

// ADMIN DELETE
window.deleteAll=async ()=>{
  if(!isAdmin) return alert("No access");

  const chats=await getDocs(collection(db,"chats"));

  chats.forEach(async c=>{
    const msgs=await getDocs(collection(db,"chats",c.id,"messages"));
    msgs.forEach(m=>deleteDoc(m.ref));
  });

  alert("All chats deleted");
};

</script>
</body>
</html>
