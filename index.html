<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>TalkZone</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0d1117;--surface:#161b22;--surface2:#1c2128;--surface3:#21262d;
  --border:#30363d;--accent:#2ea043;--accent-glow:rgba(46,160,67,0.15);
  --accent2:#58a6ff;--danger:#f85149;--warning:#e3b341;
  --text:#e6edf3;--text2:#8b949e;--text3:#484f58;
  --sent-bg:#0d3320;--recv-bg:#161b22;--online:#3fb950;
  --shadow:0 8px 32px rgba(0,0,0,0.5);--radius:12px;--radius-sm:8px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text)}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:99px}
@keyframes fadeIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes pop{0%{transform:scale(0.85);opacity:0}60%{transform:scale(1.04)}100%{transform:scale(1);opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
@keyframes msgIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* ── LOADING ── */
#loadSc{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;z-index:9999;transition:opacity .4s}
.loader{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
.load-brand{font-size:26px;font-weight:700;letter-spacing:-.5px}
.load-brand span{color:var(--accent)}

/* ── LOGIN ── */
#loginSc{position:fixed;inset:0;background:var(--bg);display:none;align-items:center;justify-content:center;padding:20px;z-index:100}
#loginSc::before{content:'';position:absolute;width:500px;height:500px;background:radial-gradient(circle,rgba(46,160,67,.05) 0%,transparent 70%);top:-80px;left:50%;transform:translateX(-50%);pointer-events:none}
.lcard{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:44px 38px;width:100%;max-width:390px;box-shadow:var(--shadow);animation:fadeIn .4s ease;position:relative;z-index:1}
.brand{display:flex;align-items:center;gap:14px;margin-bottom:30px}
.brand-icon{width:46px;height:46px;border-radius:13px;background:linear-gradient(135deg,#2ea043,#3fb950);display:flex;align-items:center;justify-content:center;font-size:22px;box-shadow:0 4px 14px rgba(46,160,67,.3)}
.brand-name{font-size:25px;font-weight:700;letter-spacing:-.5px}
.brand-name span{color:var(--accent)}
.lsub{font-size:13px;color:var(--text2);margin-bottom:26px;line-height:1.6}
.field{margin-bottom:15px}
.field label{display:block;font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:1px;margin-bottom:7px}
.field input{width:100%;padding:12px 15px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-size:15px;font-family:inherit;outline:none;transition:border-color .2s,box-shadow .2s}
.field input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow)}
.field input::placeholder{color:var(--text3)}
.lerr{display:none;background:rgba(248,81,73,.1);border:1px solid rgba(248,81,73,.25);color:var(--danger);border-radius:var(--radius-sm);padding:10px 13px;font-size:13px;margin-bottom:12px;line-height:1.5}
.lerr.show{display:block}
.lbtn{width:100%;padding:13px;background:var(--accent);border:none;border-radius:var(--radius-sm);color:#fff;font-size:15px;font-weight:600;font-family:inherit;cursor:pointer;transition:background .2s,transform .1s;letter-spacing:.2px}
.lbtn:hover{background:#3fb950}.lbtn:active{transform:scale(.99)}.lbtn:disabled{opacity:.6;cursor:not-allowed}
.lnote{text-align:center;font-size:12px;color:var(--text3);margin-top:14px}

/* ── APP ── */
#appSc{display:none;height:100vh;width:100vw;flex-direction:row;overflow:hidden}

/* ── SIDEBAR ── */
.sb{width:330px;min-width:330px;height:100vh;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;transition:transform .3s ease}
.sb-top{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:10px}
.myprof{display:flex;align-items:center;gap:11px;flex:1;min-width:0}
.av{flex-shrink:0;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;position:relative;user-select:none}
.av-lg{width:40px;height:40px;font-size:16px}
.av-sm{width:36px;height:36px;font-size:14px}
.av-xs{width:32px;height:32px;font-size:13px}
.av-dot{position:absolute;bottom:1px;right:1px;width:9px;height:9px;border-radius:50%;background:var(--online);border:2px solid var(--surface)}
.myinfo{min-width:0}
.my-name{font-weight:600;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.my-tag{font-size:12px;color:var(--accent);display:flex;align-items:center;gap:5px;margin-top:1px}
.pdot{width:7px;height:7px;background:var(--online);border-radius:50%;animation:pulse 2s infinite}
.ibt{background:transparent;border:1px solid var(--border);color:var(--text2);padding:6px 12px;border-radius:var(--radius-sm);font-size:12px;font-family:inherit;cursor:pointer;transition:all .2s;white-space:nowrap}
.ibt:hover{border-color:var(--danger);color:var(--danger)}
.sb-search{padding:10px 14px;border-bottom:1px solid var(--border);position:relative}
.sb-search input{width:100%;padding:9px 14px 9px 34px;background:var(--surface2);border:1px solid var(--border);border-radius:99px;color:var(--text);font-size:13px;font-family:inherit;outline:none;transition:border-color .2s}
.sb-search input:focus{border-color:var(--accent)}
.sb-search input::placeholder{color:var(--text3)}
.si{position:absolute;left:26px;top:50%;transform:translateY(-50%);font-size:13px;color:var(--text3);pointer-events:none}
.slbl{padding:9px 16px 3px;font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:1.2px}
.ulist{flex:1;overflow-y:auto;padding:3px 0}
.ui{padding:11px 14px;cursor:pointer;display:flex;align-items:center;gap:11px;transition:background .15s;border-left:3px solid transparent;position:relative}
.ui:hover{background:var(--surface2)}
.ui.active{background:rgba(46,160,67,.08);border-left-color:var(--accent)}
.uitxt{flex:1;min-width:0}
.uname{font-weight:600;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center;gap:5px}
.uprev{font-size:12px;color:var(--text2);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.oring{width:9px;height:9px;background:var(--online);border-radius:50%;flex-shrink:0}
.bchip{font-size:10px;background:rgba(248,81,73,.15);color:var(--danger);border:1px solid rgba(248,81,73,.25);padding:1px 6px;border-radius:99px}
.ubadge{background:var(--accent);color:#fff;font-size:10px;font-weight:700;padding:2px 7px;border-radius:99px;min-width:18px;text-align:center}

/* ── ADMIN CONTROL PANEL (obfuscated) ── */
#q7{display:none;border-top:1px solid var(--border);flex-direction:column;max-height:240px}
#q7.vis{display:flex}
.qhd{padding:8px 14px 4px;font-size:11px;font-weight:700;color:var(--warning);text-transform:uppercase;letter-spacing:1.5px;display:flex;align-items:center;gap:8px;flex-shrink:0}
.qbd{font-size:10px;background:rgba(227,179,65,.1);border:1px solid rgba(227,179,65,.2);color:var(--warning);padding:1px 8px;border-radius:99px}
.qlist{overflow-y:auto;flex:1}
.qrow{padding:7px 14px;display:flex;align-items:center;gap:8px;border-bottom:1px solid rgba(255,255,255,.03);font-size:13px}
.qname{flex:1;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.qacts{display:flex;gap:5px;flex-shrink:0}
.qb{padding:3px 9px;border:none;border-radius:5px;font-size:11px;font-weight:600;font-family:inherit;cursor:pointer;transition:opacity .2s}
.qb:hover{opacity:.75}
.qb-ban{background:var(--danger);color:#fff}
.qb-unb{background:var(--accent);color:#fff}
.qb-del{background:#6e40c9;color:#fff}
.qb-msg{background:var(--accent2);color:#fff}

/* ── CHAT AREA ── */
.ca{flex:1;display:flex;flex-direction:column;height:100vh;background:var(--bg);min-width:0}
.nochat{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;color:var(--text2)}
.nc-icon{width:80px;height:80px;background:var(--surface);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:36px;border:1px solid var(--border)}
.nochat h3{font-size:19px;color:var(--text);font-weight:600}
.nochat p{font-size:14px;text-align:center;max-width:220px;line-height:1.7}
#cv{display:none;flex:1;flex-direction:column;height:100%;overflow:hidden}
#cv.vis{display:flex}
.chead{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;background:var(--surface);flex-shrink:0}
.ch-info{flex:1;min-width:0}
.ch-name{font-weight:700;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ch-status{font-size:12px;color:var(--text2);margin-top:1px}
.ch-status.on{color:var(--online)}
.cacts{display:flex;gap:7px}
.cact{background:transparent;border:1px solid var(--border);color:var(--text2);padding:6px 12px;border-radius:var(--radius-sm);font-size:12px;font-family:inherit;cursor:pointer;transition:all .2s;white-space:nowrap}
.cact:hover{border-color:var(--danger);color:var(--danger)}
.mwrap{flex:1;overflow-y:auto;padding:14px 16px;display:flex;flex-direction:column;gap:3px}
.dsep{text-align:center;font-size:12px;color:var(--text3);padding:8px 0;display:flex;align-items:center;gap:10px}
.dsep::before,.dsep::after{content:'';flex:1;height:1px;background:var(--border)}
.mrow{display:flex;animation:msgIn .2s ease}
.mrow.sent{justify-content:flex-end}
.mrow.recv{justify-content:flex-start}
.mbub{max-width:68%;padding:10px 13px;border-radius:16px;word-wrap:break-word;white-space:pre-wrap;font-size:14px;line-height:1.55;position:relative}
.mrow.sent .mbub{background:var(--sent-bg);border:1px solid rgba(46,160,67,.28);border-bottom-right-radius:3px}
.mrow.recv .mbub{background:var(--recv-bg);border:1px solid var(--border);border-bottom-left-radius:3px}
.mmeta{display:flex;align-items:center;gap:5px;margin-top:5px;justify-content:flex-end}
.mtime{font-size:11px;color:var(--text3)}
.mtick{font-size:12px}
.mtick.seen{color:var(--accent2)}
.mdel{background:none;border:none;color:var(--text3);font-size:11px;cursor:pointer;padding:0 0 0 6px;opacity:0;transition:opacity .15s;line-height:1}
.mbub:hover .mdel{opacity:1}
.del-label{font-size:13px;color:var(--text3);font-style:italic}
.typebar{padding:3px 18px 5px;font-size:12px;color:var(--text3);font-style:italic;min-height:20px;flex-shrink:0}
.inparea{padding:11px 14px;border-top:1px solid var(--border);display:flex;align-items:center;gap:9px;background:var(--surface);flex-shrink:0}
.minp{flex:1;padding:11px 15px;background:var(--surface2);border:1px solid var(--border);border-radius:99px;color:var(--text);font-size:14px;font-family:inherit;outline:none;transition:border-color .2s}
.minp:focus{border-color:var(--accent)}
.minp::placeholder{color:var(--text3)}
.sbtn{width:40px;height:40px;background:var(--accent);border:none;border-radius:50%;color:#fff;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s,transform .1s;flex-shrink:0}
.sbtn:hover{background:#3fb950}
.sbtn:active{transform:scale(.93)}

/* ── TOAST ── */
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(14px);background:var(--surface2);border:1px solid var(--border);padding:10px 20px;border-radius:99px;font-size:14px;opacity:0;pointer-events:none;transition:all .3s;z-index:9998;box-shadow:var(--shadow);white-space:nowrap;max-width:90vw;text-align:center}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── CONFIRM MODAL ── */
.mbg{position:fixed;inset:0;background:rgba(0,0,0,.75);display:none;align-items:center;justify-content:center;z-index:500;backdrop-filter:blur(6px);padding:18px}
.mbg.open{display:flex}
.mbox{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:26px 24px;width:100%;max-width:360px;box-shadow:var(--shadow);animation:pop .25s ease}
.mbox h3{font-size:17px;font-weight:700;margin-bottom:9px}
.mbox p{font-size:14px;color:var(--text2);line-height:1.6;margin-bottom:18px}
.mbrow{display:flex;gap:9px;justify-content:flex-end}
.mb{padding:9px 18px;border-radius:var(--radius-sm);border:1px solid var(--border);font-family:inherit;font-size:14px;cursor:pointer;transition:all .2s}
.mb-c{background:var(--surface2);color:var(--text)}
.mb-danger{background:var(--danger);border-color:var(--danger);color:#fff;font-weight:600}

/* ── MOBILE ── */
.backbtn{display:none;background:transparent;border:none;color:var(--text2);font-size:22px;cursor:pointer;padding:3px;line-height:1;flex-shrink:0}
@media(max-width:660px){
  .sb{position:fixed;left:0;top:0;bottom:0;z-index:200;width:100vw;min-width:unset}
  .sb.mhide{transform:translateX(-100%)}
  .ca{position:fixed;inset:0;z-index:100}
  .ca.mhide{opacity:0;pointer-events:none}
  .backbtn{display:flex!important}
  .mbub{max-width:82%}
}
</style>
</head>
<body>

<!-- LOADING -->
<div id="loadSc">
  <div class="load-brand">Talk<span>Zone</span></div>
  <div class="loader"></div>
</div>

<!-- LOGIN -->
<div id="loginSc">
  <div class="lcard">
    <div class="brand">
      <div class="brand-icon">💬</div>
      <div class="brand-name">Talk<span>Zone</span></div>
    </div>
    <p class="lsub">Username aur password daalo.<br>Naya account? Auto-create hoga.</p>
    <div class="field">
      <label>Username</label>
      <input type="text" id="iu" placeholder="e.g. krishna" autocomplete="off" autocapitalize="off" spellcheck="false" maxlength="20">
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="ip" placeholder="min 6 characters" autocomplete="current-password">
    </div>
    <div class="lerr" id="lerr"></div>
    <button class="lbtn" id="lbtn">Login / Sign Up</button>
    <p class="lnote">No email or phone number needed ✦</p>
  </div>
</div>

<!-- APP -->
<div id="appSc">
  <!-- SIDEBAR -->
  <div class="sb" id="sb">
    <div class="sb-top">
      <div class="myprof">
        <div class="av av-lg" id="myAv"><div class="av-dot"></div></div>
        <div class="myinfo">
          <div class="my-name" id="myN">—</div>
          <div class="my-tag"><div class="pdot"></div>Online</div>
        </div>
      </div>
      <button class="ibt" id="logBt">Logout</button>
    </div>
    <div class="sb-search">
      <span class="si">🔍</span>
      <input id="srch" placeholder="Search users…" autocomplete="off">
    </div>
    <div class="slbl">People</div>
    <div class="ulist" id="ulist"></div>

    <!-- ADMIN PANEL — id obfuscated, no "admin" text in DOM -->
    <div id="q7">
      <div class="qhd">⚙ Control <span class="qbd">RESTRICTED</span></div>
      <div class="qlist" id="q7L"></div>
    </div>
  </div>

  <!-- CHAT AREA -->
  <div class="ca" id="ca">
    <div class="nochat" id="nchat">
      <div class="nc-icon">💬</div>
      <h3>TalkZone</h3>
      <p>Select a user to start a private conversation</p>
    </div>
    <div id="cv">
      <div class="chead">
        <button class="backbtn" id="bbtn">‹</button>
        <div class="av av-sm" id="cAv">—</div>
        <div class="ch-info">
          <div class="ch-name" id="cNm">—</div>
          <div class="ch-status" id="cSt">Offline</div>
        </div>
        <div class="cacts">
          <button class="cact" id="blkBt">Block</button>
        </div>
      </div>
      <div class="mwrap" id="mwrap"></div>
      <div class="typebar" id="tbar"></div>
      <div class="inparea">
        <input class="minp" id="minp" placeholder="Type a message…" autocomplete="off">
        <button class="sbtn" id="sndbtn">➤</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="tst"></div>
<div class="mbg" id="mbg">
  <div class="mbox">
    <h3 id="mTtl">Confirm</h3>
    <p id="mBdy">Are you sure?</p>
    <div class="mbrow">
      <button class="mb mb-c" id="mCnl">Cancel</button>
      <button class="mb mb-danger" id="mOk">Confirm</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp }   from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword,
         signOut, onAuthStateChanged }
                           from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc, addDoc, collection, onSnapshot,
         query, where, orderBy, updateDoc, deleteDoc, getDocs, serverTimestamp }
                           from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getDatabase, ref, set, onValue, onDisconnect, serverTimestamp as rtTs }
                           from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

/* ══════════════════════════════════════
   FIREBASE CONFIG — apna config yahan
══════════════════════════════════════ */
const FC = {
  apiKey:            "AIzaSyAKLZ4dHYp0ZFLolMB5XPxDUu-QPXB_MqA",
  authDomain:        "talkzone-b3488.firebaseapp.com",
  databaseURL:       "https://talkzone-b3488-default-rtdb.firebaseio.com",
  projectId:         "talkzone-b3488",
  storageBucket:     "talkzone-b3488.firebasestorage.app",
  messagingSenderId: "526945974843",
  appId:             "1:526945974843:web:997fb419c944ae9c1fba1e"
};

const fbApp = initializeApp(FC);   // ✅ "fbApp" — not "app" to avoid DOM id conflict
const auth  = getAuth(fbApp);
const db    = getFirestore(fbApp);
const rt    = getDatabase(fbApp);

/* ══════════════════════════════════════
   STATE
══════════════════════════════════════ */
let ME     = null;   // Firebase Auth user
let MED    = null;   // Firestore user doc data
let PRIV   = false;  // Admin privilege — set ONLY after server-side check via _p collection
let SUID   = null;   // Selected chat user uid
let SNM    = null;   // Selected chat user name
let mUnsub = null;   // Message listener unsubscribe
let uUnsub = null;   // Users listener unsubscribe
let ALLU   = {};     // uid → user data cache
let BLOCKED= new Set();
let typT   = null;

const $  = id => document.getElementById(id);
const cid = (a,b) => a < b ? a+'_'+b : b+'_'+a;

/* ══════════════════════════════════════
   HELPERS
══════════════════════════════════════ */
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') }
function sc(s){  // deterministic avatar color from string
  let h=0; for(let i=0;i<s.length;i++) h=s.charCodeAt(i)+((h<<5)-h);
  return ['#2ea043','#58a6ff','#6e40c9','#e3b341','#f0883e','#388bfd','#db6d28'][Math.abs(h)%7];
}
function ini(n){ n=(n||'?').trim(); const p=n.split(' '); return p.length>1?(p[0][0]+p[1][0]).toUpperCase():n.slice(0,2).toUpperCase() }
function av(name,sz='sm'){ return `<div class="av av-${sz}" style="background:${sc(name)}">${ini(name)}</div>` }
function ft(ts){ if(!ts) return ''; const d=ts.toDate?ts.toDate():new Date(ts); return d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}) }
function fd(ts){
  if(!ts) return '';
  const d=ts.toDate?ts.toDate():new Date(ts), n=new Date();
  if(d.toDateString()===n.toDateString()) return 'Today';
  const y=new Date(n); y.setDate(y.getDate()-1);
  if(d.toDateString()===y.toDateString()) return 'Yesterday';
  return d.toLocaleDateString([],{day:'numeric',month:'short'});
}

let _toastT;
function toast(m,d=2700){
  const t=$('tst'); t.textCont
