<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>TalkZone Stable</title>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<style>
body{margin:0;background:#0d1117;color:#fff;font-family:sans-serif}
.app{display:flex;height:100vh}
.sidebar{width:280px;background:#161b22;overflow:auto}
.chat{flex:1;display:flex;flex-direction:column}

.user{padding:10px;border-bottom:1px solid #222;cursor:pointer}
.user:hover{background:#222}

.msg{margin:5px;padding:8px;border-radius:8px;max-width:60%}
.me{background:#2ea043;margin-left:auto}
.other{background:#30363d}

.top{padding:10px;border-bottom:1px solid #333}

input,button{padding:10px;border:none}
input{background:#0d1117;color:#fff;width:100%}
button{background:#2ea043;color:#fff}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
<input id="u" placeholder="username">
<input id="p" type="password" placeholder="password">
<button onclick="login()">Login</button>
</div>

<!-- APP -->
<div id="app" class="app" style="display:none">

<div class="sidebar">
<input id="search" placeholder="Search user">
<div id="users"></div>
</div>

<div class="chat">
<div class="top" id="chatName">Select user</div>

<div id="msgs" style="flex:1;overflow:auto"></div>

<div style="display:flex">
<input id="m" placeholder="message">
<button onclick="send()">Send</button>
</div>
</div>

</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAKLZ4dHYp0ZFLolMB5XPxDUu-QPXB_MqA",
  authDomain: "talkzone-b3488.firebaseapp.com",
  projectId: "talkzone-b3488"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

let ME=null;
let currentChat=null;
let otherUser=null;

// ❌ AUTO LOGIN FIX
window.onload = ()=> auth.signOut();

// ✅ LOGIN (FINAL FIX)
async function login(){

let u=uEl.value.trim().toLowerCase();
let p=pEl.value;

if(u.length<3 || p.length<6){
  alert("Invalid");
  return;
}

let email=u+"@chat.com";

try{

await auth.signInWithEmailAndPassword(email,p);

}catch(e){

if(e.code==="auth/user-not-found"){

// username unique
let check=await db.collection("users").where("name","==",u).get();
if(!check.empty){
alert("Username already taken ❌");
return;
}

let cred=await auth.createUserWithEmailAndPassword(email,p);

await db.collection("users").doc(cred.user.uid).set({
name:u,
uid:cred.user.uid
});

}else if(e.code==="auth/wrong-password"){
alert("Wrong password ❌");
return;
}else{
alert(e.message);
return;
}

}

}

// AUTH
auth.onAuthStateChanged(user=>{
if(user){
ME=user;
login.style.display="none";
app.style.display="flex";
loadUsers();
}
});

// LOAD USERS
function loadUsers(){
db.collection("users").onSnapshot(snap=>{
users.innerHTML="";

snap.forEach(doc=>{
let u=doc.data();
if(u.uid===ME.uid) return;

let div=document.createElement("div");
div.className="user";
div.innerText=u.name;

div.onclick=()=>openChat(u);

users.appendChild(div);
});
});
}

// SEARCH
search.oninput=()=>{
let val=search.value.toLowerCase();

db.collection("users").get().then(snap=>{
users.innerHTML="";

snap.forEach(doc=>{
let u=doc.data();
if(u.uid===ME.uid) return;

if(u.name.includes(val)){
let div=document.createElement("div");
div.className="user";
div.innerText=u.name;

div.onclick=()=>openChat(u);

users.appendChild(div);
}
});
});
};

// OPEN CHAT
function openChat(user){

otherUser=user;
currentChat=[ME.uid,user.uid].sort().join("_");

chatName.innerText=user.name;

loadMessages();
}

// LOAD MESSAGES
function loadMessages(){

db.collection("chats")
.doc(currentChat)
.collection("messages")
.orderBy("time")
.onSnapshot(snap=>{

msgs.innerHTML="";

snap.forEach(doc=>{
let m=doc.data();

let div=document.createElement("div");
div.className="msg "+(m.uid===ME.uid?"me":"other");
div.innerText=m.text;

msgs.appendChild(div);
});

msgs.scrollTop=msgs.scrollHeight;

});

}

// SEND
function send(){

if(!currentChat){
alert("Select user");
return;
}

let text=m.value;
if(!text) return;

db.collection("chats")
.doc(currentChat)
.collection("messages")
.add({
text:text,
uid:ME.uid,
time:Date.now()
});

m.value="";
}

</script>

</body>
</html>
