<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TalkZone Final</title>
</head>

<body style="font-family:sans-serif">

<h2>💬 TalkZone</h2>

<input id="user" placeholder="Username">
<input id="pass" type="password" placeholder="Password">
<button onclick="login()">Login / Signup</button>

<hr>

<h3>Users</h3>
<div id="users"></div>

<hr>

<h3 id="chatWith">Select user</h3>
<div id="chatBox" style="height:300px;overflow:auto;border:1px solid #ccc;"></div>

<input id="msg" placeholder="Type message">
<button onclick="sendMsg()">Send</button>

<script type="module">

// 🔥 FULL FIREBASE SDK IMPORT
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, addDoc, onSnapshot, doc, setDoc, getDoc, getDocs, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// 🔐 FIREBASE CONFIG (अपना डालो)
const firebaseConfig = {
  apiKey: "PASTE_API_KEY",
  authDomain: "PASTE_DOMAIN",
  projectId: "PASTE_PROJECT_ID"
};

// INIT
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let me=null;
let isRoot=false;
let currentChat=null;

// 🔐 LOGIN / SIGNUP
window.login = async ()=>{
  const u=user.value.trim();
  const p=pass.value.trim();

  if(!u||!p) return alert("Enter details");

  const email = u + "@chat.com";

  try{
    let res;

    try{
      res = await signInWithEmailAndPassword(auth,email,p);
    }catch{
      res = await createUserWithEmailAndPassword(auth,email,p);

      // 👤 SAVE USER
      await setDoc(doc(db,"users",res.user.uid),{
        name:u,
        z:false
      });
    }

    me = res.user.uid;

    // 🔥 HIDDEN ADMIN CHECK
    const snap = await getDoc(doc(db,"users",me));
    if(snap.exists()){
      const data = snap.data();
      if(data.z === true){
        isRoot = true;
        console.log("🔥 Hidden Admin Mode ON");
      }
    }

    loadUsers();

  }catch(e){
    alert("Error");
    console.log(e);
  }
};

// 👥 LOAD USERS
function loadUsers(){
  onSnapshot(collection(db,"users"), snap=>{
    users.innerHTML="";

    snap.forEach(d=>{
      const data=d.data();

      if(d.id===me) return;

      // 👻 HIDE ADMIN FROM NORMAL USERS
      if(data.z===true && !isRoot) return;

      users.innerHTML += `
      <div onclick="openChat('${d.id}','${data.name}')" 
      style="padding:8px;border-bottom:1px solid #ccc;cursor:pointer">
      ${data.name}
      </div>`;
    });
  });
}

// 💬 CHAT ID
function chatId(a,b){
  return a < b ? a+"_"+b : b+"_"+a;
}

// 📩 OPEN CHAT
window.openChat = (uid,name)=>{
  currentChat = chatId(me,uid);
  chatWith.innerText = "Chat with " + name;

  onSnapshot(collection(db,"chats",currentChat,"messages"), snap=>{
    chatBox.innerHTML="";

    snap.forEach(d=>{
      const m=d.data();

      if(m.sender===me){
        chatBox.innerHTML += `<div style="text-align:right;color:green">You: ${m.text}</div>`;
      }else{
        chatBox.innerHTML += `<div style="text-align:left;color:blue">${name}: ${m.text}</div>`;
      }
    });

    chatBox.scrollTop = chatBox.scrollHeight;
  });
};

// 📤 SEND MESSAGE
window.sendMsg = async ()=>{
  if(!currentChat) return alert("Select user");

  const text = msg.value.trim();
  if(!text) return;

  await addDoc(collection(db,"chats",currentChat,"messages"),{
    sender: me,
    text: text,
    time: new Date()
  });

  msg.value="";
};

// 💀 ADMIN DELETE ALL
window.deleteAll = async ()=>{
  if(!isRoot) return alert("No access");

  const chats = await getDocs(collection(db,"chats"));

  chats.forEach(async c=>{
    const msgs = await getDocs(collection(db,"chats",c.id,"messages"));
    msgs.forEach(m=>deleteDoc(m.ref));
  });

  alert("All chats deleted");
};

</script>

</body>
</html>
