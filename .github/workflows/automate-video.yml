name: Daily Civil Engineering Shorts

on:
  schedule:
    - cron: '30 2 * * *'     # IST subah \~8:00 baje (UTC 2:30 AM)
  workflow_dispatch:
    inputs:
      topic:
        description: 'Custom Civil Engineering Topic'
        required: false

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Save YouTube Secret
        run: echo '${{ secrets.YOUTUBE_CLIENT_SECRET }}' > client_secrets.json

      - name: Generate Civil Engineering Video
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          VIDEO_TOPIC: ${{ github.event.inputs.topic }}
        run: python main.py
