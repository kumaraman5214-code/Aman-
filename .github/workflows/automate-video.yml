name: Daily Civil Engineering Shorts

on:
  schedule:
    - cron: '30 2 * * *'   # IST subah \~8:00 baje
  workflow_dispatch:
    inputs:
      topic:
        description: 'Custom Topic (optional)'
        required: false

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Save Client Secret
        run: echo '${{ secrets.YOUTUBE_CLIENT_SECRET }}' > client_secrets.json

      - name: Run Video Generator
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          HUGGINGFACE_API_TOKEN: ${{ secrets.HUGGINGFACE_API_TOKEN }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          VIDEO_TOPIC: ${{ github.event.inputs.topic }}
        run: python main.py
